<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Odin Calculator</title>
</head>
<body>
    <div class="container">
        <div class="display"></div>
        <div class="buttons">
            <div class="left">
                <div class="controls">
                    <button id="backspace">←</button>
                    <button id="clear">C</button>
                </div>
                <div class="numpad">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button id="plusMinus">+/-</button>
                    <button>0</button>
                    <button>.</button>
                </div>
            </div>
            <div class="right">
                <div class="operators">
                    <button id="divide">÷</button>
                    <button id="multiply">x</button>
                    <button id="subtract">-</button>
                    <button id="add">+</button>
                </div>
                <button id="equals">=</button>
            </div>

        </div>


    </div>
</body>
</html>
