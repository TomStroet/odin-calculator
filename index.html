<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Odin Calculator</title>
</head>
<body>
    <div class="container">
        <div class="display"></div>
        <div class="buttons">
            <div class="left">
                <div class="controls">
                    <button id="backspace">←</button>
                    <button id="clear">C</button>
                </div>
                <div class="numpad">
                    <button data-type="digit" data-value="1">1</button>
                    <button data-type="digit" data-value="2">2</button>
                    <button data-type="digit" data-value="3">3</button>
                    <button data-type="digit" data-value="4">4</button>
                    <button data-type="digit" data-value="5">5</button>
                    <button data-type="digit" data-value="6">6</button>
                    <button data-type="digit" data-value="7">7</button>
                    <button data-type="digit" data-value="8">8</button>
                    <button data-type="digit" data-value="9">9</button>
                    <button data-type="sign">+/-</button>
                    <button data-type="digit" data-value="0">0</button>
                    <button data-type="decimal">.</button>
                </div>
            </div>
            <div class="right">
                <div class="operators">
                    <button data-type="divide">÷</button>
                    <button data-type="multiply">x</button>
                    <button data-type="subtract">-</button>
                    <button data-type="add">+</button>
                    <button data-type="operate">=</button>
                </div>
            </div>

        </div>


    </div>
</body>
</html>
